<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Welcome Screen</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:
  "Segoe UI",
  "SF Pro Display",
  sans-serif;
}

/* IDLE SCREEN */

#idle{
  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:
  radial-gradient(circle at center,
  #111 0%,
  #050505 45%,
  #000 100%);
}

#clock{
  font-size:9vw;
  font-weight:100;
  color:white;
  letter-spacing:6px;

  text-shadow:
  0 0 30px rgba(255,255,255,.08);

  user-select:none;
}

#date{
  margin-top:12px;
  color:#888;
  font-size:1.2vw;
  letter-spacing:4px;
}

/* WELCOME SCREEN */

#welcomeScreen{
  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  background:black;

  opacity:0;
  visibility:hidden;

  transition:
  opacity .8s ease,
  visibility .8s ease;

  z-index:100;
}

#welcomeScreen.show{
  opacity:1;
  visibility:visible;
}

#welcomeImage{
  max-width:85%;
  max-height:85%;

  transform:scale(.9);
  transition:transform .8s ease;

  filter:
  drop-shadow(0 0 30px rgba(255,255,255,.15));
}

#welcomeScreen.show #welcomeImage{
  transform:scale(1);
}

/* hidden camera */

video{
  position:fixed;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

#status{
  position:fixed;
  bottom:20px;
  right:20px;

  font-size:12px;
  color:#555;

  z-index:999;
}
  #qrPanel{
    position:fixed;
    top:40px;
    right:40px;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    padding:0;
    background:none;
    backdrop-filter:blur(12px);

    border:none;

    border-radius:20px;
}

#qrCode{
    width:220px;
    height:220px;
    background:white;
    padding:12px;
    border-radius:16px;
    box-shadow:
      0 10px 40px rgba(0,0,0,.4);
}

.qrTitle{
    color:white;
    font-size:14px;
    font-weight:600;
    letter-spacing:2px;
}

.qrSub{
    color:#aaa;
    margin-top:4px;
    font-size:13px;
}
/* ===========================
   Animated Scan Here Arrow
=========================== */

#scanArrow{
    position:fixed;
    top:270px;
    right:120px;
    pointer-events:none;
    z-index:999;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.scanLabel{

    color:#ff3030;
    font-size:26px;
    font-weight:900;
    letter-spacing:3px;
    margin-top:10px;
    animation:
        textBlink .6s infinite alternate;
    text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 40px red;
}

#scanArrow svg{
    overflow:visible;
}

#snakePath{
    fill:none;
    stroke:#ff2020;
    stroke-width:6;
    stroke-linecap:round;
    marker-end:url(#arrowHead);
    /* airport snake */
    stroke-dasharray:12 12;
    animation:snakeMove .45s linear infinite;filter:
        drop-shadow(0 0 10px red)
        drop-shadow(0 0 18px red);
        mask: url(#trailMask);
}
#arrowHead{
    animation:pulseArrow .8s infinite;
}

@keyframes textBlink {
    from { opacity: .5; }
    to { opacity: 1; }
}
  /* ===========================
   Bottom Safety Ticker
=========================== */

#ticker{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    height:48px;
    background:rgba(0,0,0,.85);
    border-top:2px solid #ffd400;
    overflow:hidden;
    z-index:9999;
}

#tickerText{
    position:absolute;
    white-space:nowrap;
    color:#ffd400;
    font-size:34px;
    font-weight:700;
    line-height:48px;
    padding-left:100%;
    text-shadow:
        0 0 6px rgba(255,212,0,.7);
    animation:tickerMove 28s linear infinite;
}

@keyframes tickerMove{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-100%);
    }
}
</style>
</head>

<body>

<div id="idle">
  <div id="clock">00:00:00</div>
  <div id="date"></div>

  <div id="qrPanel">
    <img src="qr.png" id="qrCode">
    </div>
</div>
</div>
<!-- Animated Scan Here Arrow -->
<div id="scanArrow">
    <div class="scanLabel">Semak Status Giliran Anda.</div>
    <svg width="200" height="750" viewBox="0 0 200 750">
        <defs>
            <!-- 
              Perfect 360 loop path:
              1. Starts bottom-center, goes UP and curves RIGHT
              2. Sweeps over the TOP and around to the LEFT
              3. Crosses back UNDER the center and shoots UP-RIGHT 
            -->
            <path id="flightPath"
                  d="M 100 700 
                     C 100 230, 180 230, 180 150 
                     C 180 50, 20 50, 20 150 
                     C 20 250, 100 230, 170 10" />

            <radialGradient id="fadeGrad">
                <stop offset="0%" stop-color="white" stop-opacity="1" />
                <stop offset="35%" stop-color="white" stop-opacity="0.8" />
                <stop offset="100%" stop-color="white" stop-opacity="0" />
            </radialGradient>

            <mask id="trailMask">
                <rect width="100%" height="100%" fill="black" />
                <circle r="90" fill="url(#fadeGrad)">
                    <animateMotion dur="2.5s" repeatCount="indefinite">
                        <mpath href="#flightPath"/>
                    </animateMotion>
                </circle>
            </mask>
        </defs>

        <!-- Dashed trail -->
        <use href="#flightPath" id="snakePath" />

        <!-- Arrowhead -->
        <g filter="drop-shadow(0 0 10px red) drop-shadow(0 0 18px red)">
            <polygon points="-8,-6 8,0 -8,6" fill="#ff3030">
                <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#flightPath"/>
                </animateMotion>
            </polygon>
        </g>
    </svg>
</div>
<div id="welcomeScreen">
  <img id="welcomeImage" src="welcome.png">
</div>

<video id="webcam" autoplay playsinline muted></video>

<audio id="welcomeAudio" preload="auto">
  <source src="welcome.mp3" type="audio/mpeg">
</audio>

<div id="status">Loading AI...</div>

<script type="module">

import {
 FilesetResolver,
 FaceDetector
}
from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

const video = document.getElementById("webcam");
const audio = document.getElementById("welcomeAudio");
const welcomeScreen = document.getElementById("welcomeScreen");
const statusBox = document.getElementById("status");

let detector;

let triggered = false;
let lastSeen = 0;
let showingWelcome = false;

async function initCamera(){

 const stream = await navigator.mediaDevices.getUserMedia({
   video:{
     width:640,
     height:480,
     facingMode:"user"
   },
   audio:false
 });

 video.srcObject = stream;

 return new Promise(resolve=>{
   video.onloadedmetadata=()=>resolve();
 });

}

async function initAI(){

 const vision =
 await FilesetResolver.forVisionTasks(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
 );

 detector =
 await FaceDetector.createFromOptions(
  vision,
  {
   baseOptions:{
    modelAssetPath:
    "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite"
   },

   runningMode:"VIDEO",

   minDetectionConfidence:0.6
  }
 );

}

function updateClock(){

 const now = new Date();

 const time =
 now.toLocaleTimeString("en-GB");

 const date =
 now.toLocaleDateString("en-GB",{
  weekday:"long",
  day:"2-digit",
  month:"long",
  year:"numeric"
 });

 document.getElementById("clock").textContent=time;
 document.getElementById("date").textContent=date;

}

setInterval(updateClock,1000);
updateClock();

async function detectLoop(){

 if(detector){

  const result =
  detector.detectForVideo(
   video,
   performance.now()
  );

  let closePerson = false;

  if(result.detections.length){

   const box =
   result.detections[0].boundingBox;

   const area =
   (box.width*box.height)/
   (video.videoWidth*video.videoHeight);

   /*
    close enough threshold
   */

   if(area > 0.08){
      closePerson=true;
      lastSeen=Date.now();
   }

  }

  if(closePerson &&
     !triggered &&
     !showingWelcome){

      playWelcome();
  }

  if(triggered){

    if(Date.now()-lastSeen>2000){

      triggered=false;
      statusBox.textContent=
      "Ready for next visitor";
    }
  }

 }

 requestAnimationFrame(detectLoop);

}

async function playWelcome(){

 showingWelcome=true;
 triggered=true;

 statusBox.textContent=
 "Visitor detected";

 welcomeScreen.classList.add("show");

 try{
   audio.currentTime=0;
   await audio.play();
 }catch(err){
   console.log(err);
 }

 setTimeout(()=>{

   welcomeScreen.classList.remove("show");

   showingWelcome=false;

 },5000);

}

async function start(){

 try{

   await initCamera();

   statusBox.textContent=
   "Loading AI model...";

   await initAI();

   statusBox.textContent=
   "Ready";

   detectLoop();

 }catch(err){

   console.error(err);

   statusBox.textContent=
   "Camera permission required";
 }

}

start();

</script>
<div id="ticker">
    <div id="tickerText">
        ⚠️ Sekiranya alarm kebakaran diaktifkan, jangan cemas dan ikuti arahan petugas kami. Utamakan Orang Kurang Upaya (OKU), warga emas, ibu mengandung dan kanak-kanak.
    </div>
</div>
</body>
</html>

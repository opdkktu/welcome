<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Welcome Screen</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:
  "Segoe UI",
  "SF Pro Display",
  sans-serif;
}

/* IDLE SCREEN */

#idle{
  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:
  radial-gradient(circle at center,
  #111 0%,
  #050505 45%,
  #000 100%);
}

#clock{
  font-size:9vw;
  font-weight:100;
  color:white;
  letter-spacing:6px;

  text-shadow:
  0 0 30px rgba(255,255,255,.08);

  user-select:none;
}

#date{
  margin-top:12px;
  color:#888;
  font-size:1.2vw;
  letter-spacing:4px;
}

/* WELCOME SCREEN */

#welcomeScreen{
  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  background:black;

  opacity:0;
  visibility:hidden;

  transition:
  opacity .8s ease,
  visibility .8s ease;

  z-index:100;
}

#welcomeScreen.show{
  opacity:1;
  visibility:visible;
}

#welcomeImage{
  max-width:85%;
  max-height:85%;

  transform:scale(.9);
  transition:transform .8s ease;

  filter:
  drop-shadow(0 0 30px rgba(255,255,255,.15));
}

#welcomeScreen.show #welcomeImage{
  transform:scale(1);
}

/* hidden camera */

video{
  position:fixed;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

#status{
  position:fixed;
  bottom:20px;
  right:20px;

  font-size:12px;
  color:#555;

  z-index:999;
}
  #qrPanel{
    position:fixed;
    top:40px;
    right:40px;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    padding:0;
    background:none;
    backdrop-filter:blur(12px);

    border:none;

    border-radius:20px;
}

#qrCode{
    width:220px;
    height:220px;
    background:white;
    padding:12px;
    border-radius:16px;
    box-shadow:
      0 10px 40px rgba(0,0,0,.4);
}

.qrTitle{
    color:white;
    font-size:14px;
    font-weight:600;
    letter-spacing:2px;
}

.qrSub{
    color:#aaa;
    margin-top:4px;
    font-size:13px;
}
/* ===========================
   Animated Scan Here Arrow
=========================== */

#scanArrow{
    position:fixed;
    top:110px;
    right:300px;
    pointer-events:none;
    z-index:999;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.scanLabel{

    color:#ff3030;
    font-size:26px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:10px;
    animation:
        textBlink .8s infinite alternate;
    text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 40px red;
}

#scanArrow svg{
    overflow:visible;
}

#snakePath{
    fill:none;
    stroke:#ff2020;
    stroke-width:6;
    stroke-linecap:round;
    marker-end:url(#arrowHead);
    /* airport snake */
    stroke-dasharray:2 18;
    animation:snakeMove .45s linear infinite;filter:
        drop-shadow(0 0 10px red)
        drop-shadow(0 0 18px red);
}
#arrowHead{
    animation:pulseArrow .8s infinite;
}

@keyframes snakeMove{
    from{
        stroke-dashoffset:0;
    }
    to{
        stroke-dashoffset:-23;
    }
}

@keyframes textBlink{
    from{
        opacity:.5;
    }
    to{
        opacity:1;
    }
}

@keyframes pulseArrow{
    from{
        transform:scale(.9);
    }
    to{
        transform:scale(1.15);
    }
}
</style>
</head>

<body>

<div id="idle">
  <div id="clock">00:00:00</div>
  <div id="date"></div>

  <div id="qrPanel">
    <img src="qr.png" id="qrCode">

    <div class="qrText">
        <div class="qrTitle">SCAN QR CODE</div>
        <div class="qrSub">
            Semak Status Giliran Anda
        </div>
    </div>
</div>
</div>
  
<!-- Animated Scan Here Arrow -->
<div id="scanArrow">
    <div class="scanLabel">SCAN HERE</div>
    <svg width="420" height="320" viewBox="0 0 420 320">
        <defs>
            <marker id="arrowHead"
                markerWidth="8"
                markerHeight="8"
                refX="6"
                refY="3"
                orient="auto">
                <polygon
                    points="0 0,6 3,0 6"
                    fill="#ff3030"/>
            </marker>
        </defs>
        <path
            id="snakePath"
            d="
            M40 270
            C60 220 120 170 190 160
            S300 120 355 55
            "
            marker-end="url(#arrowHead)"
        />
    </svg>
</div>
<div id="welcomeScreen">
  <img id="welcomeImage" src="welcome.png">
</div>

<video id="webcam" autoplay playsinline muted></video>

<audio id="welcomeAudio" preload="auto">
  <source src="welcome.mp3" type="audio/mpeg">
</audio>

<div id="status">Loading AI...</div>

<script type="module">

import {
 FilesetResolver,
 FaceDetector
}
from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

const video = document.getElementById("webcam");
const audio = document.getElementById("welcomeAudio");
const welcomeScreen = document.getElementById("welcomeScreen");
const statusBox = document.getElementById("status");

let detector;

let triggered = false;
let lastSeen = 0;
let showingWelcome = false;

async function initCamera(){

 const stream = await navigator.mediaDevices.getUserMedia({
   video:{
     width:640,
     height:480,
     facingMode:"user"
   },
   audio:false
 });

 video.srcObject = stream;

 return new Promise(resolve=>{
   video.onloadedmetadata=()=>resolve();
 });

}

async function initAI(){

 const vision =
 await FilesetResolver.forVisionTasks(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
 );

 detector =
 await FaceDetector.createFromOptions(
  vision,
  {
   baseOptions:{
    modelAssetPath:
    "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite"
   },

   runningMode:"VIDEO",

   minDetectionConfidence:0.6
  }
 );

}

function updateClock(){

 const now = new Date();

 const time =
 now.toLocaleTimeString("en-GB");

 const date =
 now.toLocaleDateString("en-GB",{
  weekday:"long",
  day:"2-digit",
  month:"long",
  year:"numeric"
 });

 document.getElementById("clock").textContent=time;
 document.getElementById("date").textContent=date;

}

setInterval(updateClock,1000);
updateClock();

async function detectLoop(){

 if(detector){

  const result =
  detector.detectForVideo(
   video,
   performance.now()
  );

  let closePerson = false;

  if(result.detections.length){

   const box =
   result.detections[0].boundingBox;

   const area =
   (box.width*box.height)/
   (video.videoWidth*video.videoHeight);

   /*
    close enough threshold
   */

   if(area > 0.08){
      closePerson=true;
      lastSeen=Date.now();
   }

  }

  if(closePerson &&
     !triggered &&
     !showingWelcome){

      playWelcome();
  }

  if(triggered){

    if(Date.now()-lastSeen>2000){

      triggered=false;
      statusBox.textContent=
      "Ready for next visitor";
    }
  }

 }

 requestAnimationFrame(detectLoop);

}

async function playWelcome(){

 showingWelcome=true;
 triggered=true;

 statusBox.textContent=
 "Visitor detected";

 welcomeScreen.classList.add("show");

 try{
   audio.currentTime=0;
   await audio.play();
 }catch(err){
   console.log(err);
 }

 setTimeout(()=>{

   welcomeScreen.classList.remove("show");

   showingWelcome=false;

 },5000);

}

async function start(){

 try{

   await initCamera();

   statusBox.textContent=
   "Loading AI model...";

   await initAI();

   statusBox.textContent=
   "Ready";

   detectLoop();

 }catch(err){

   console.error(err);

   statusBox.textContent=
   "Camera permission required";
 }

}

start();

</script>

</body>
</html>
